<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Table Booking</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"></head><body><header class="topbar"><button class="icon-btn" id="menuBtn">☰</button><div class="brand" id="brandName">Table Booking</div><a class="admin-link" href="admin.html" title="Admin">⚙️</a></header><aside class="sidebar" id="sidebar"><div class="menu-title" id="sideBrand">Table Booking</div><nav class="menu"><a href="#home">🏠 หน้าแรก</a><a href="#events">🎫 อีเวนต์</a><a href="#booking">🍽️ จองโต๊ะ</a><a href="#contact">📞 ติดต่อเรา</a><a href="admin.html">⚙️ แอดมิน</a></nav></aside><div class="overlay" id="overlay"></div><main class="container"><section class="hero" id="home"><h1 id="heroTitle">ระบบจองโต๊ะออนไลน์</h1><p>เลือกโต๊ะจากผังจริง จองง่ายผ่านมือถือ</p><div style="margin-top:18px"><a href="#booking" class="btn btn-secondary">เริ่มจองโต๊ะ</a></div></section><section class="card" id="events"><h2>อีเวนต์ / รอบจอง</h2><div class="grid" id="eventList"></div></section><section class="card" id="booking"><div class="step">ขั้นตอน 1 จาก 4</div><h2>เลือกวันและเวลา</h2><div class="form-row"><input type="date" id="bookingDate"><div class="chips" id="slotList"></div></div></section><section class="card"><div class="step">ขั้นตอน 2 จาก 4</div><h2>เลือกโต๊ะจากผัง</h2><div class="chips" id="zoneFilters"></div><div class="map-wrap" id="tableMap"></div></section><section class="card"><div class="step">ขั้นตอน 3 จาก 4</div><h2>ข้อมูลผู้จอง</h2><div class="form-row"><input id="firstName" placeholder="ชื่อ"><input id="lastName" placeholder="นามสกุล"><input id="phone" placeholder="เบอร์โทร"><input id="email" placeholder="Email"><input
